# Lucid Trading prop-firm account profile.
# Account size: $25,000  |  Max drawdown: $1,000  |  No time limit
#
# Critical math:
#   - MNQ contract: $2/point, $0.50/tick (0.25 pt tick size)
#   - Default trade: 2 micros × 15 pt SL = $60 risk/trade
#   - $1,000 DD / $60 = ~16 max consecutive full-stops (zero tolerance for sloppy days)
#
# Therefore the killswitches must be aggressive.

account:
  broker: lucid_quantower
  capital_usd: 25000.0
  max_drawdown_usd: 1000.0           # hard cap, account is suspended past this
  max_drawdown_pct: 4.0
  daily_loss_limit_usd: 250.0        # cuts a bad day at 25% of total DD budget
  data_symbol: ENQU26                # E-mini NQ Sep 2026 (M=Jun expired 2026-06)
  exec_symbol: MNQU26                # Micro NQ Sep 2026

connection:
  dom2_url: http://localhost:8080/dom2
  lucid_url: http://localhost:6001
  poll_hz: 2                          # 2 reads/sec is more than enough for 1m bars
  bar_window_minutes: 240             # rolling window of bars given to detectors
  reconnect_threshold_sec: 10

risk:
  per_trade_risk_pct: 0.24            # ~$60 on $25k → 1 SL ≈ 6% of DD budget
  max_quantity: 2                     # never more than 2 micros at once
  min_quantity: 1
  daily_loss_limit_pct: 1.0           # $250 → matches account.daily_loss_limit_usd
  # 1m mode (pilot 005b): worst consecutive streak observed = 7 over 2 yr.
  # Cap at 6 so the streak hits the kill switch BEFORE materializing the
  # full worst-case ($210 lost vs $700 of real margin after the $300 already
  # spent on the previous bot). User decision: accept the early-stop risk
  # in exchange for the 5x faster route to the $1,250 evaluation target.
  max_consecutive_losses: 6
  max_trades_per_day: 8               # 1m mode runs ~1.8 trades/day; 8 is a noisy-day stop

setups:
  enabled: [unicorn, mss_fvg, ob_ote, silver_bullet]
  # Calibration: pilots 001 -> 005b in docs/pilots/.
  # The live runner builds 1-minute bars from the DOM2 mid feed and feeds
  # them straight to the detectors (no resampling), so the validated
  # backtest cell is the pilot-005b 1m mode B row:
  #   1.83 trades/day, WR 60%, expectancy +1.17R, WF 8/8 OOS positive,
  #   p95 max DD 5.92%, worst consecutive losers 7 in 2 years.
  # User decision (urgency over selectivity): faster path to the $1,250
  # evaluation target. Slower 5m mode (WF +0.88R) is the conservative
  # fallback if 1m degrades in live — switching back is a TF parameter.
  tf: 1m
  body_atr_min: 1.0
  body_range_min: 0.5
  min_rr: 1.0                          # redundant when tp_strategy=fixed_R
  tp_strategy: fixed_R                 # "nearest_pool" | "fixed_R"
  fixed_tp_r: 1.5

execution:
  dry_run: false                       # set true to validate wiring without orders
  enforce_killzones: true
  enforce_midnight_filter: true
  enforce_force_flat: true             # close all at 16:30 NY
  starting_equity_for_sizing: 25000.0  # used by RiskConfig.size_position()
  # Session filter — pilot 005 (docs/pilots/005_session_mode_comparison.md)
  # showed Silver-Bullet-only mode beats all alternatives on every risk
  # metric (MaxDD halved, p95 DD ~1/3, peor trade -40%, max consec losers
  # 3 vs 6) while keeping 81% of total PnL. Operating only 10-11 NY and
  # 14-15 NY also matches the user's awake schedule.
  allowed_windows:
    - silver_bullet_am
    - silver_bullet_pm
